<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>郑尧 ♥ 黄梦婷 · 相册</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Noto+Serif+SC:wght@200;300;400;500;600&family=Ma+Shan+Zheng&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{background:#EFE3CF;font-family:'Noto Serif SC','Cormorant Garamond',serif;color:#3B342B;-webkit-font-smoothing:antialiased;overflow-x:hidden;}
  :root{--gold:#C0A062;--ink:#3B342B;--cream:#FBF7F0;--red:#9a2018;}
  ::selection{background:rgba(192,160,98,.3);}
  img{user-select:none;-webkit-user-drag:none;}

  @keyframes glowDrift{0%{transform:translate(0,0) scale(1);}100%{transform:translate(5%,-4%) scale(1.16);}}
  @keyframes petalFall{0%{transform:translate3d(0,-12vh,0) rotate(0deg);}33%{transform:translate3d(var(--drift),28vh,0) rotate(70deg);}66%{transform:translate3d(calc(var(--drift)*-1),64vh,0) rotate(150deg);}100%{transform:translate3d(0,114vh,0) rotate(230deg);}}
  @keyframes softPulse{0%,100%{opacity:.3;}50%{opacity:.85;}}
  @keyframes spin{to{transform:rotate(360deg);}}
  @keyframes lbIn{from{opacity:0;}to{opacity:1;}}
  @keyframes revealIn{from{opacity:0;transform:translateY(30px);filter:blur(7px);}to{opacity:1;transform:none;filter:none;}}
  @keyframes floatY{0%,100%{transform:translateY(0);}50%{transform:translateY(-8px);}}
  /* open/close: book cover lifts open + spread unfolds from the spine — NO opacity fade */
  @keyframes coverOpenSwing{0%{transform:rotateY(0deg);}100%{transform:rotateY(-106deg);}}
  @keyframes coverCloseSwing{0%{transform:rotateY(-106deg);}100%{transform:rotateY(0deg);}}
  @keyframes readerUnfold{0%{clip-path:inset(0 50% 0 50%);transform:scale(.88);}100%{clip-path:inset(0 0 0 0);transform:scale(1);}}
  @keyframes readerFold{0%{clip-path:inset(0 0 0 0);transform:scale(1);}100%{clip-path:inset(0 50% 0 50%);transform:scale(.88);}}
  /* page-turn sheen + cast shadow, synced to the leaf rotation */
  @keyframes leafSheenFront{0%{opacity:0;}50%{opacity:.6;}100%{opacity:.6;}}
  @keyframes leafSheenBack{0%{opacity:.6;}50%{opacity:.6;}100%{opacity:0;}}
  @keyframes castFade{0%{opacity:.6;}55%{opacity:.36;}100%{opacity:0;}}

  [data-reveal]{opacity:0;}
  [data-reveal].in{animation:revealIn 1.05s cubic-bezier(.2,.6,.35,1) both;}

  /* ---------- album stack: closed cover + reader share one cell (overlap during the open/close) ---------- */
  .album-stack{display:grid;justify-items:center;align-items:start;width:100%;}
  .album-stack>.closed-screen,.album-stack>.reader{grid-area:1/1;}
  .closed-screen{display:flex;flex-direction:column;align-items:center;justify-content:flex-start;position:relative;z-index:3;}
  .cover-holder{perspective:1500px;perspective-origin:50% 46%;}
  .cover-dolly{transform-style:preserve-3d;animation:floatY 6s ease-in-out infinite;}
  .album-cover{position:relative;width:clamp(262px,42vw,360px);aspect-ratio:3/4;transform-origin:left center;transform-style:preserve-3d;cursor:pointer;}
  .cover-face{position:absolute;inset:0;backface-visibility:hidden;-webkit-backface-visibility:hidden;}
  .cover-back{transform:rotateY(180deg);}

  /* ---------- flip reader ---------- */
  .reader{display:none;width:100%;max-width:1000px;position:relative;z-index:1;}
  .book-stage{position:relative;margin:0 auto;touch-action:pan-y;}
  .book-frame{position:relative;border-radius:5px;background:linear-gradient(145deg,#d3b478,#a4854a);box-shadow:0 56px 100px -44px rgba(60,40,12,.72);}
  .book-inner{position:relative;display:flex;align-items:flex-start;background:#efe2c6;perspective:2000px;}
  .rpage{position:relative;overflow:hidden;aspect-ratio:3/4;flex:0 0 auto;min-width:0;}
  .leaf{position:absolute;z-index:12;transform-style:preserve-3d;will-change:transform;}
  .leaf-face{position:absolute;inset:0;backface-visibility:hidden;-webkit-backface-visibility:hidden;overflow:hidden;}
  .leaf-face.back{transform:rotateY(180deg);}
  .leaf-shade{position:absolute;inset:0;pointer-events:none;opacity:0;z-index:30;}
  .flip-cast{position:absolute;top:0;bottom:0;z-index:11;pointer-events:none;opacity:0;}

  /* phase visibility + open/close choreography (continuous, NO fade) */
  [data-phase="opening"] .reader,[data-phase="open"] .reader,[data-phase="closing"] .reader{display:block;}
  [data-phase="opening"] .reader{animation:readerUnfold 1.5s cubic-bezier(.33,0,.18,1) both;}
  [data-phase="closing"] .reader{animation:readerFold 1.2s cubic-bezier(.5,0,.3,1) both;}
  [data-phase="open"] .closed-screen{display:none;}
  [data-phase="opening"] .album-cover{animation:coverOpenSwing 1.4s cubic-bezier(.42,.02,.16,1) both;}
  [data-phase="closing"] .album-cover{animation:coverCloseSwing 1.15s cubic-bezier(.45,.02,.3,1) both;}
  [data-phase="opening"] .cover-dolly,[data-phase="closing"] .cover-dolly{animation:none;}
  [data-phase="opening"] #openBtn,[data-phase="open"] #openBtn,[data-phase="closing"] #openBtn{visibility:hidden;pointer-events:none;}
  [data-phase="opening"] .cd-below,[data-phase="closing"] .cd-below{visibility:hidden;}

  .navbtn{width:48px;height:48px;border-radius:50%;border:1px solid var(--gold);background:rgba(251,247,240,.7);color:var(--gold);font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .3s ease;}
  .navbtn:hover{background:var(--gold);color:#fff;}
  .closebtn{display:inline-flex;align-items:center;gap:8px;margin:18px auto 0;padding:10px 24px;border:1px solid var(--gold);border-radius:40px;background:rgba(251,247,240,.6);color:#8a6d3a;font-family:'Noto Serif SC',serif;font-size:13px;letter-spacing:3px;cursor:pointer;transition:all .3s ease;}
  .closebtn:hover{background:var(--gold);color:#fff;}

  @media (prefers-reduced-motion: reduce){
    [data-reveal]{opacity:1!important;}
    [data-reveal].in{animation:none!important;opacity:1!important;}
    .petal,.glow,.disc,.hint,.cover-dolly{animation:none!important;}
    .album-cover,.leaf,.leaf *,.reader,.cover-dolly{transition:none!important;animation:none!important;}
  }
</style>
</head>
<body>

  var Music=(function(){
    var audio=document.getElementById('audio'),disc=document.getElementById('disc'),titleEl=document.getElementById('mTitle'),toggleBtn=document.getElementById('mToggle');
    var raw=[],queue=[],pos=0,playing=false;
    function shuffle(a){ a=a.slice(); for(var i=a.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1)),t=a[i];a[i]=a[j];a[j]=t;} return a; }

    function reflect(){ toggleBtn.textContent=playing?'❚❚':'▶'; disc.style.animationPlayState=playing?'running':'paused'; }
    function play(){ if(!queue.length)return; audio.play().then(function(){playing=true;reflect();}).catch(function(){playing=false;reflect();}); }
    function toggle(){ if(!queue.length)return; if(playing){audio.pause();playing=false;reflect();} else play(); }
    function next(){ if(!queue.length)return; pos=(pos+1)%queue.length; if(pos===0) queue=shuffle(raw); setTrack(pos); if(playing) play(); }
    function prev(){ if(!queue.length)return; pos=(pos-1+queue.length)%queue.length; setTrack(pos); if(playing) play(); }
    function startOnOpen(){ if(!queue.length) return; if(playing) return; queue=shuffle(raw); setTrack(0); play(); }
    function use(t){ if(Array.isArray(t)&&t.length){ raw=t; queue=shuffle(raw); setTrack(0); } }
    toggleBtn.addEventListener('click',toggle);
    document.getElementById('mPrev').addEventListener('click',prev);
    document.getElementById('mNext').addEventListener('click',next);
    audio.addEventListener('ended',next);

    else { fetch('musics/playlist.json').then(function(r){return r.ok?r.json():[];}).then(use).catch(function(){}); }
    return { startOnOpen:startOnOpen };
  })();

    el.style.background=pageObj.bg; el.style.boxShadow=pageObj.shadow; el.innerHTML=pageObj.items.join('');
  }
  function relRect(el){ var c=bookInner.getBoundingClientRect(),r=el.getBoundingClientRect(); return {left:r.left-c.left,top:r.top-c.top,width:r.width,height:r.height}; }

  function makeLeaf(rect,frontPage,backPage,originLeft){
    var leaf=document.createElement('div'); leaf.className='leaf';
    leaf.style.left=rect.left+'px'; leaf.style.top=rect.top+'px'; leaf.style.width=rect.width+'px'; leaf.style.height=rect.height+'px';
    leaf.style.transformOrigin=originLeft?'left center':'right center'; leaf.style.transform='rotateY(0deg)';
    var fShade = originLeft
      ? 'background:linear-gradient(90deg,rgba(30,18,4,.45) 0%,rgba(30,18,4,0) 45%,rgba(255,250,240,.16) 100%);'
      : 'background:linear-gradient(270deg,rgba(30,18,4,.45) 0%,rgba(30,18,4,0) 45%,rgba(255,250,240,.16) 100%);';
    var bShade = originLeft
      ? 'background:linear-gradient(90deg,rgba(255,250,240,.16) 0%,rgba(30,18,4,0) 55%,rgba(30,18,4,.45) 100%);'
      : 'background:linear-gradient(270deg,rgba(255,250,240,.16) 0%,rgba(30,18,4,0) 55%,rgba(30,18,4,.45) 100%);';
    leaf.innerHTML =
      '<div class="leaf-face front">'+faceInner(frontPage)+'<div class="leaf-shade f" style="'+fShade+'"></div></div>'+
      '<div class="leaf-face back">'+faceInner(backPage)+'<div class="leaf-shade b" style="'+bShade+'"></div></div>';
    return leaf;
  }
  function makeCast(rect,originLeft){
    var c=document.createElement('div'); c.className='flip-cast';
    c.style.left=rect.left+'px'; c.style.width=rect.width+'px';
    c.style.background = originLeft
      ? 'linear-gradient(90deg,rgba(30,18,4,.34),rgba(30,18,4,0) 70%)'
      : 'linear-gradient(270deg,rgba(30,18,4,.34),rgba(30,18,4,0) 70%)';
    return c;
  }

  function flip(dir){
    if(flipping||phase!=='open') return;
    var pp=perPage, maxStart=N-pp;
    var next=start+dir*pp;
    if(next<0||next>maxStart) return;
    var forward=dir>0;

    if(reduce){
      bookInner.style.transition='opacity .16s ease'; bookInner.style.opacity='0';
      setTimeout(function(){ start=next; renderReader(); bookInner.style.opacity='1'; },160);
      return;
    }

    flipping=true; bookStage.style.pointerEvents='none';
    var pageEls=bookInner.querySelectorAll('.rpage');
    var leftEl=pageEls[0], rightEl=pp===2?pageEls[1]:null;
    var coveredEl,frontPage,backPage,originLeft,revealEl,revealPage;

    if(pp===2){
      if(forward){ coveredEl=rightEl; originLeft=true; frontPage=pages[start+1]; backPage=pages[start+2]||frontPage; revealEl=rightEl; revealPage=pages[start+3]||pages[start+2]||frontPage; }
      else { coveredEl=leftEl; originLeft=false; frontPage=pages[start]; backPage=pages[start-1]; revealEl=leftEl; revealPage=pages[start-2]||pages[start-1]||frontPage; }
    } else {
      coveredEl=leftEl; revealEl=leftEl;
      if(forward){ originLeft=true; frontPage=pages[start]; backPage=pages[start+1]; revealPage=pages[start+1]; }
      else { originLeft=false; frontPage=pages[start]; backPage=pages[start-1]; revealPage=pages[start-1]; }
    }

    var rect=relRect(coveredEl);
    var leaf=makeLeaf(rect,frontPage,backPage,originLeft);
    var cast=makeCast(rect,originLeft);
    bookInner.appendChild(cast); bookInner.appendChild(leaf);
    setPageEl(revealEl,revealPage);

    var fShade=leaf.querySelector('.leaf-shade.f'), bShade=leaf.querySelector('.leaf-shade.b');
    requestAnimationFrame(function(){ requestAnimationFrame(function(){
      var deg=forward?-172:172, ease='cubic-bezier(.55,.06,.30,1)';
      leaf.style.transition='transform '+FLIP_MS+'ms '+ease;
      leaf.style.transform='rotateY('+deg+'deg)';
      fShade.style.animation='leafSheenFront '+FLIP_MS+'ms '+ease+' forwards';
      bShade.style.animation='leafSheenBack '+FLIP_MS+'ms '+ease+' forwards';
      cast.style.animation='castFade '+FLIP_MS+'ms ease-out forwards';
    }); });

    var fired=false;
    function done(){ start=next; renderReader(); flipping=false; bookStage.style.pointerEvents=''; }
    leaf.addEventListener('transitionend',function(ev){ if(ev.propertyName==='transform'&&!fired){ fired=true; done(); } });
    setTimeout(function(){ if(!fired){ fired=true; done(); } }, FLIP_MS+140);
  }

  /* ---------------- open / close ---------------- */
  var animT1=null;
  function openBook(){
    if(phase!=='closed') return;
    Music.startOnOpen();
    renderReader();                 // spread is solid underneath — revealed by motion, never faded in
    if(reduce){ setPhase('open'); return; }
    setPhase('opening');            // cover lifts open + spread unfolds from the spine
    clearTimeout(animT1);
    animT1=setTimeout(function(){ setPhase('open'); }, 1500);
  }
  function closeBook(){
    if(phase!=='open') return;
    if(reduce){ setPhase('closed'); start=0; perPage=window.innerWidth>=820?2:1; return; }
    setPhase('closing');            // spread folds back to the spine + cover lowers shut
    clearTimeout(animT1);
    animT1=setTimeout(function(){ setPhase('closed'); start=0; perPage=window.innerWidth>=820?2:1; }, 1200);
  }

  document.getElementById('openBtn').addEventListener('click',openBook);
  document.getElementById('albumCover').addEventListener('click',openBook);
  document.getElementById('closeBtn').addEventListener('click',closeBook);
  document.getElementById('albumPrev').addEventListener('click',function(){ flip(-1); });
  document.getElementById('albumNext').addEventListener('click',function(){ flip(1); });

  // click photo -> lightbox
  bookInner.addEventListener('click',function(e){
    var fig=e.target.closest('figure[data-lb]'); if(!fig||flipping) return;
    var idx=parseInt(fig.getAttribute('data-lb'),10);
    if(!isNaN(idx)) openLightbox(lbAll,idx);
  });

  // swipe
  var x0=null,y0=null;
  bookStage.addEventListener('touchstart',function(e){ x0=e.touches[0].clientX; y0=e.touches[0].clientY; },{passive:true});
  bookStage.addEventListener('touchend',function(e){
    if(x0==null)return; var dx=e.changedTouches[0].clientX-x0, dy=e.changedTouches[0].clientY-y0;
    if(Math.abs(dx)>45&&Math.abs(dx)>Math.abs(dy)) flip(dx<0?1:-1);
    x0=y0=null;
  },{passive:true});

  // keyboard paging while open
  window.addEventListener('keydown',function(e){
    if(phase!=='open'||lb.el.style.display==='flex')return;
    if(e.key==='ArrowLeft')flip(-1); else if(e.key==='ArrowRight')flip(1);
  });

  // responsive
  window.addEventListener('resize',function(){
    var pp=window.innerWidth>=820?2:1;
    if(pp!==perPage){ perPage=pp; if(pp===2) start=start-(start%2); if(phase==='open') renderReader(); }
  });

  /* idphoto lightbox */
  (function(){ var idp=P('idphoto'); document.getElementById('idphoto').addEventListener('click',function(){ openLightbox([idp],0); }); })();

})();
</script>
